<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Report Shell</title>
  <!--
    Report Shell — loaded as app://localhost/report-shell.html (same-origin as main window)
    Responsibilities:
      1. Pre-loads local ECharts + ApexCharts vendor scripts
      2. Receives postMessage { type:'render', html, theme } from React parent
      3. Builds inner srcdoc that:
         - Inherits echarts/ApexCharts objects via parent reference (same-origin cross-frame)
         - Has theme CSS variables injected at the TOP of <head> (highest specificity)
         - Has AI's external CDN script tags stripped (local vendor used instead)
      4. Forwards errors + ready signals back via postMessage
      5. Accepts { type:'theme-update', theme } to patch live without rebuilding iframe
  -->
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
    #report-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
    #shell-error {
      display: none;
      position: fixed;
      bottom: 8px;
      left: 8px;
      right: 8px;
      background: rgba(220, 38, 38, 0.92);
      color: #fff;
      font-size: 12px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', monospace, sans-serif;
      padding: 8px 12px;
      border-radius: 8px;
      z-index: 9999;
      word-break: break-word;
      white-space: pre-wrap;
    }
    #shell-loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f8f9fa;
      color: #94a3b8;
      font-size: 13px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
      transition: opacity 0.3s;
    }
    html.dark #shell-loading { background: #1e293b; }
  </style>
</head>
<body>
  <div id="shell-loading">正在准备渲染引擎…</div>
  <iframe id="report-frame" sandbox="allow-scripts allow-same-origin" title="Report"></iframe>
  <div id="shell-error"></div>

  <!--
    Load local vendor scripts SYNCHRONOUSLY in shell's window scope.
    Because shell is app://localhost, the inner srcdoc iframe is also app://localhost origin,
    allowing: innerIframe.contentWindow.echarts = window.echarts (same-origin cross-frame)
  -->
  <script src="./vendor/echarts.min.js"></script>
  <script src="./vendor/apexcharts.min.js"></script>
  <script src="./vendor/vtable.min.js"></script>
  <script src="./vendor/interactivity-engine.js"></script>

  <script>
  (function () {
    'use strict';

    var frame = document.getElementById('report-frame');
    var errorEl = document.getElementById('shell-error');
    var loadingEl = document.getElementById('shell-loading');
    var currentTheme = 'tech'; // default theme
    var pendingRender = null; // queued while shell is not ready
    var shellReady = false;

    // ── Vendor libraries now available in this window ──────────────────
    // After inner frame loads srcdoc we transfer them into its scope.

    function showError(msg) {
      if (!errorEl) return;
      errorEl.style.display = 'block';
      errorEl.textContent = '⚠ 渲染错误: ' + String(msg).slice(0, 400);
      try { window.parent.postMessage({ type: 'report-error', message: msg }, '*'); } catch (e) { /* ignore */ }
    }

    function clearError() {
      if (errorEl) { errorEl.style.display = 'none'; errorEl.textContent = ''; }
    }

    // ── Strip external CDN <script src> tags from AI HTML ───────────────
    // The shell provides the libraries; we don't want duplicate loading.
    var CDN_PATTERNS = [
      /cdn\.jsdelivr\.net/i,
      /unpkg\.com/i,
      /cdn\.bootcdn\.net/i,
      /cdnjs\.cloudflare\.com/i,
      /staticfile\.org/i,
      /echarts\.apache\.org/i,
      /visactor/i,
    ];

    // Patterns for local vendor scripts that are already loaded by the shell.
    // AI-generated HTML may reference these via wrong paths (e.g. assets/ instead of vendor/).
    var LOCAL_VENDOR_PATTERNS = [
      /interactivity-engine/i,
      /filter-controls/i,
      /vtable/i,
      /duckdb/i,
    ];

    function stripExternalScripts(html) {
      // Strip external CDN <script src> tags — local vendor is used instead
      var stripped = html.replace(/<script[^>]+src=["'][^"']*["'][^>]*><\/script>/gi, function (tag) {
        var isCdn = CDN_PATTERNS.some(function (re) { return re.test(tag); });
        // Also strip local vendor scripts that AI may have duplicated with wrong paths
        var isLocalVendor = LOCAL_VENDOR_PATTERNS.some(function (re) { return re.test(tag); });
        return (isCdn || isLocalVendor) ? ('<!-- [shell] script stripped: loaded by shell -->' ) : tag;
      });
      // Strip external CDN <link rel="stylesheet"> tags to prevent 404 errors
      stripped = stripped.replace(/<link[^>]+href=["'][^"']*["'][^>]*/gi, function (tag) {
        var isExtCdn = CDN_PATTERNS.some(function (re) { return re.test(tag); });
        // Also strip links that reference local-looking paths that don't exist (e.g. vendor/themes.css)
        var isBadLocal = /href=["'](?!https?:\/\/)(?!app:\/\/)(?:vendor\/|\/vendor\/)/i.test(tag);
        return (isExtCdn || isBadLocal) ? '<!-- [shell] external link stripped -->' : tag;
      });
      return stripped;
    }

    // ── Animated background CSS generator ──────────────────────────────
    // Returns raw CSS lines (no <style> wrapper) for the chosen preset ID.
    // Keyframes are included once; the ::before pseudo-element acts as the bg layer.
    var ANIMATED_BG_KEYFRAMES = [
      '@keyframes abg-shift-lr{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}',
      '@keyframes abg-shift-diag{0%{background-position:0% 0%}33%{background-position:100% 50%}66%{background-position:50% 100%}100%{background-position:0% 0%}}',
      '@keyframes abg-blob-a{0%,100%{transform:translate(0%,0%) scale(1)}25%{transform:translate(4%,-6%) scale(1.08)}50%{transform:translate(-4%,6%) scale(0.94)}75%{transform:translate(6%,3%) scale(1.06)}}',
      '@keyframes abg-blob-b{0%,100%{transform:translate(0%,0%) scale(1)}30%{transform:translate(-5%,4%) scale(1.10)}60%{transform:translate(5%,-5%) scale(0.92)}}',
      '@keyframes abg-blob-c{0%,100%{transform:translate(0%,0%) scale(1)}40%{transform:translate(3%,8%) scale(1.06)}80%{transform:translate(-6%,-3%) scale(0.96)}}',
      '@keyframes abg-grid-glow{0%,100%{opacity:0.25}50%{opacity:0.55}}',
      '@keyframes abg-poly-hue{0%,100%{filter:hue-rotate(0deg) brightness(1)}50%{filter:hue-rotate(25deg) brightness(1.05)}}',
    ].join('\n');

    var ANIMATED_BG_CONFIGS = {
      'warm-flow':      { type:'gradient', bg:'linear-gradient(-45deg,#f97316,#fcd34d,#ec4899,#a855f7,#f43f5e,#f97316)', size:'400% 400%', anim:'abg-shift-lr 12s ease infinite' },
      'blue-aurora':    { type:'blob', base:'#1a0533', blobs:[
        { w:'100%',h:'120%',l:'-20%',t:'-20%', c:'rgba(124,58,237,0.55)', a:'abg-blob-a 16s ease-in-out infinite' },
        { w:'80%', h:'80%', r:'-10%',b:'-15%', c:'rgba(14,165,233,0.5)',  a:'abg-blob-b 20s ease-in-out infinite 4s' },
        { w:'60%', h:'60%', l:'30%', t:'25%',  c:'rgba(232,121,249,0.45)',a:'abg-blob-c 13s ease-in-out infinite 2s' },
      ]},
      'cotton-candy':   { type:'blob', base:'linear-gradient(135deg,#c7d2fe 0%,#e9d5ff 50%,#fce7f3 100%)', blobs:[
        { w:'90%',h:'90%',l:'-20%',t:'-25%', c:'rgba(191,219,254,0.7)', a:'abg-blob-a 9s ease-in-out infinite' },
        { w:'75%',h:'75%',r:'-15%',b:'-20%', c:'rgba(240,171,252,0.75)',a:'abg-blob-b 11s ease-in-out infinite 3s' },
        { w:'55%',h:'55%',l:'25%', t:'20%',  c:'rgba(253,186,116,0.35)',a:'abg-blob-c 15s ease-in-out infinite 1s' },
      ]},
      'northern-lights':{ type:'blob', base:'#050d1e', blobs:[
        { w:'110%',h:'70%',l:'-5%', t:'-10%', c:'rgba(6,78,59,0.7)',    a:'abg-blob-a 18s ease-in-out infinite' },
        { w:'80%', h:'80%',r:'-20%',t:'10%',  c:'rgba(76,29,149,0.6)',  a:'abg-blob-b 22s ease-in-out infinite 5s' },
        { w:'60%', h:'60%',l:'20%', b:'-10%', c:'rgba(14,165,233,0.4)', a:'abg-blob-c 14s ease-in-out infinite 2s' },
      ]},
      'cyber-grid':     { type:'grid', base:'linear-gradient(135deg,#0f172a,#1e1b4b,#0f172a)', gridColor:'rgba(59,130,246,0.12)', gridSize:'42px 42px' },
      'sunset-wave':    { type:'gradient', bg:'linear-gradient(-45deg,#1e3a5f,#7c2d12,#c2410c,#ea580c,#fcd34d,#c2410c,#1e3a5f)', size:'400% 400%', anim:'abg-shift-lr 14s ease infinite' },
      'deep-ocean':     { type:'gradient', bg:'linear-gradient(180deg,#0c4a6e,#0369a1,#38bdf8,#0369a1,#0c4a6e)', size:'200% 400%', anim:'abg-shift-lr 18s ease infinite' },
      'prism-burst':    { type:'gradient', bg:'linear-gradient(135deg,#f43f5e,#f97316,#22c55e,#3b82f6,#a855f7,#f43f5e)', size:'400% 400%', anim:'abg-shift-diag 10s ease infinite' },
      'neon-pulse':     { type:'blob', base:'#0f172a', blobs:[
        { w:'70%',h:'70%',l:'15%',t:'15%', c:'rgba(79,70,229,0.4)', a:'abg-blob-a 8s ease-in-out infinite' },
        { w:'50%',h:'50%',r:'5%', b:'5%',  c:'rgba(232,121,249,0.5)',a:'abg-blob-b 11s ease-in-out infinite 2s' },
      ]},
      'cosmic-drift':   { type:'blob', base:'#020617', blobs:[
        { w:'80%',h:'80%',l:'-10%',t:'-10%', c:'rgba(30,27,75,0.8)', a:'abg-blob-a 20s ease-in-out infinite' },
        { w:'60%',h:'60%',r:'-5%', b:'-5%',  c:'rgba(12,74,110,0.6)',a:'abg-blob-b 25s ease-in-out infinite 5s' },
      ]},
      'emerald-mist':   { type:'blob', base:'#064e3b', blobs:[
        { w:'90%',h:'90%',l:'-15%',t:'-15%', c:'rgba(13,148,136,0.5)', a:'abg-blob-a 14s ease-in-out infinite' },
        { w:'70%',h:'70%',r:'-10%',b:'-10%', c:'rgba(167,243,208,0.3)',a:'abg-blob-b 18s ease-in-out infinite 3s' },
      ]},
      'finance-gold':   { type:'gradient', bg:'linear-gradient(135deg,#1c1917,#292524,#78350f,#b45309,#292524,#1c1917)', size:'300% 300%', anim:'abg-shift-diag 16s ease infinite' },
      'stock-green':    { type:'gradient', bg:'linear-gradient(135deg,#052e16,#14532d,#16a34a,#4ade80,#16a34a,#052e16)', size:'300% 300%', anim:'abg-shift-lr 12s ease infinite' },
      'corporate-blue': { type:'gradient', bg:'linear-gradient(135deg,#0f172a,#1e3a5f,#1d4ed8,#3b82f6,#1d4ed8,#0f172a)', size:'300% 300%', anim:'abg-shift-diag 14s ease infinite' },
      'data-flow':      { type:'gradient', bg:'linear-gradient(135deg,#0c0c1e,#1e3a8a,#3b82f6,#22d3ee,#3b82f6,#1e3a8a)', size:'400% 400%', anim:'abg-shift-lr 10s ease infinite' },
      'matrix-rain':    { type:'gradient', bg:'linear-gradient(180deg,#0a0f0a,#052e16,#15803d,#052e16,#0a0f0a)', size:'200% 400%', anim:'abg-shift-lr 8s ease infinite' },
      'circuit-board':  { type:'grid', base:'#0f172a', gridColor:'rgba(14,165,233,0.1)', gridSize:'24px 24px' },
      'medical-clean':  { type:'gradient', bg:'linear-gradient(135deg,#f0f9ff,#e0f2fe,#bae6fd,#7dd3fc,#bae6fd,#f0f9ff)', size:'300% 300%', anim:'abg-shift-diag 18s ease infinite' },
      'health-pulse':   { type:'blob', base:'#0f172a', blobs:[
        { w:'80%',h:'80%',l:'-10%',t:'-10%', c:'rgba(12,74,110,0.7)',  a:'abg-blob-a 12s ease-in-out infinite' },
        { w:'60%',h:'60%',r:'-5%', b:'-5%',  c:'rgba(6,95,70,0.6)',   a:'abg-blob-b 16s ease-in-out infinite 3s' },
      ]},
      'campus-sky':     { type:'gradient', bg:'linear-gradient(135deg,#eff6ff,#dbeafe,#bfdbfe,#93c5fd,#bfdbfe,#eff6ff)', size:'300% 300%', anim:'abg-shift-diag 20s ease infinite' },
      'knowledge-deep': { type:'gradient', bg:'linear-gradient(135deg,#1e1b4b,#312e81,#4338ca,#6366f1,#4338ca,#1e1b4b)', size:'300% 300%', anim:'abg-shift-lr 14s ease infinite' },
      'retail-warm':    { type:'gradient', bg:'linear-gradient(-45deg,#7c2d12,#dc2626,#f97316,#fbbf24,#f97316,#7c2d12)', size:'300% 300%', anim:'abg-shift-lr 10s ease infinite' },
      'pastel-shop':    { type:'blob', base:'#fdf4ff', blobs:[
        { w:'80%',h:'80%',l:'-10%',t:'-10%', c:'rgba(217,70,239,0.15)',a:'abg-blob-a 12s ease-in-out infinite' },
        { w:'70%',h:'70%',r:'-10%',b:'-10%', c:'rgba(236,72,153,0.12)',a:'abg-blob-b 15s ease-in-out infinite 3s' },
      ]},
      'industrial-steel':{ type:'gradient', bg:'linear-gradient(135deg,#0f172a,#1e293b,#475569,#94a3b8,#475569,#1e293b)', size:'300% 300%', anim:'abg-shift-diag 18s ease infinite' },
      'energy-flow':    { type:'gradient', bg:'linear-gradient(-45deg,#1c1917,#292524,#b45309,#f59e0b,#fcd34d,#f59e0b,#b45309)', size:'400% 400%', anim:'abg-shift-lr 12s ease infinite' },
      'geo-poly':       { type:'gradient', bg:'linear-gradient(135deg,#1e3a8a 0%,#0ea5e9 45%,#14b8a6 75%,#fbbf24 100%)', size:'200% 200%', anim:'abg-poly-hue 18s ease-in-out infinite' },
    };

    function buildAnimatedBgCss(presetId, opacity, cardBg) {
      var cfg = ANIMATED_BG_CONFIGS[presetId];
      var lines = [];
      // Always include keyframes so they are available
      lines.push(ANIMATED_BG_KEYFRAMES);
      // Base page background (transparent so ::before shows through)
      lines.push('html, body { background-color: transparent !important; position: relative; }');
      if (cfg) {
        if (cfg.type === 'gradient') {
          lines.push('body::before {');
          lines.push('  content: ""; position: fixed; inset: 0; z-index: -2; pointer-events: none;');
          lines.push('  background: ' + cfg.bg + ';');
          lines.push('  background-size: ' + cfg.size + ';');
          lines.push('  animation: ' + cfg.anim + ';');
          lines.push('  opacity: ' + opacity + ';');
          lines.push('}');
        } else if (cfg.type === 'blob') {
          // Base color layer via ::before
          lines.push('body::before {');
          lines.push('  content: ""; position: fixed; inset: 0; z-index: -2; pointer-events: none;');
          if (cfg.base.indexOf('gradient') !== -1) {
            lines.push('  background: ' + cfg.base + ';');
          } else {
            lines.push('  background-color: ' + cfg.base + ';');
          }
          lines.push('  opacity: ' + opacity + ';');
          lines.push('}');
          // Blob layers via ::after (combined with pseudo-elements on body direct children is not feasible in pure CSS;
          // We simulate blobs by injecting an absolutely-positioned overlay div via a data-uri SVG background trick,
          // or simply using radial-gradient layers on ::before itself for blob-like effect)
          var blobGrads = cfg.blobs.map(function(b) {
            // Each blob is a radial-gradient centered at approximate position
            return 'radial-gradient(ellipse ' + b.w + ' ' + b.h + ' at ' +
              (b.l ? b.l : 'calc(100% - ' + b.r + ')') + ' ' +
              (b.t ? b.t : 'calc(100% - ' + b.b + ')') + ', ' +
              b.c + ', transparent 65%)';
          });
          lines.push('body::after {');
          lines.push('  content: ""; position: fixed; inset: 0; z-index: -1; pointer-events: none;');
          lines.push('  background: ' + blobGrads.join(',') + ';');
          lines.push('  animation: abg-blob-a ' + (cfg.blobs[0] ? cfg.blobs[0].a.split(' ')[1] || '16s' : '16s') + ' ease-in-out infinite;');
          lines.push('  opacity: ' + Math.min(1, opacity * 1.4) + ';');
          lines.push('}');
        } else if (cfg.type === 'grid') {
          lines.push('body::before {');
          lines.push('  content: ""; position: fixed; inset: 0; z-index: -2; pointer-events: none;');
          if (cfg.base.indexOf('gradient') !== -1) {
            lines.push('  background: ' + cfg.base + ';');
          } else {
            lines.push('  background-color: ' + cfg.base + ';');
          }
          lines.push('  opacity: ' + opacity + ';');
          lines.push('}');
          lines.push('body::after {');
          lines.push('  content: ""; position: fixed; inset: 0; z-index: -1; pointer-events: none;');
          lines.push('  background-image: linear-gradient(' + cfg.gridColor + ' 1px,transparent 1px),linear-gradient(90deg,' + cfg.gridColor + ' 1px,transparent 1px);');
          lines.push('  background-size: ' + cfg.gridSize + ';');
          lines.push('  animation: abg-grid-glow 5s ease-in-out infinite;');
          lines.push('  opacity: ' + opacity + ';');
          lines.push('}');
        }
      } else {
        // Unknown preset — fallback gradient
        lines.push('body::before { content:""; position:fixed; inset:0; z-index:-2; pointer-events:none; background:linear-gradient(135deg,#667eea,#764ba2); opacity:' + opacity + '; }');
      }
      // Make cards semi-transparent so background shows through
      if (cardBg) {
        lines.push('.card,.kpi-card,.chart-card,.section,section,[class*="card"],[class*="panel"],[class*="widget"] {');
        lines.push('  background-color: ' + cardBg + 'cc !important;');
        lines.push('  backdrop-filter: blur(2px);');
        lines.push('}');
      } else {
        lines.push('.card,.kpi-card,.chart-card,.section,section,[class*="card"],[class*="panel"],[class*="widget"] {');
        lines.push('  background-color: rgba(255,255,255,0.15) !important;');
        lines.push('  backdrop-filter: blur(2px);');
        lines.push('}');
      }
      return lines.join('\n');
    }

    // ── Build User-selected Theme + Layout Links ─────────────────────────
    function buildThemeLink(themeId, layoutId) {
      if (!themeId || themeId === 'auto') themeId = 'business';
      var mapping = {
        'classic':        'business',
        'business':       'business',
        'tech':           'tech',
        'bento':          'bento',
        'neo-brutalism':  'neo-brutalism',
        'editorial':      'editorial',
        'glassmorphism':  'glassmorphism',
        'base':           'base',
      };
      var resolved = mapping[themeId] || 'business';
      var baseUrl = window.location.origin || 'app://localhost';
      // 1. Base theme (reset + default vars)
      var links = '<link rel="stylesheet" href="' + baseUrl + '/styles/themes/theme-base.css">\n' +
                  '<link rel="stylesheet" id="__shell-theme-link" href="' + baseUrl + '/styles/themes/theme-' + resolved + '.css">';
      // 2. Layout base
      links += '\n<link rel="stylesheet" id="__shell-layout-base-link" href="' + baseUrl + '/styles/layouts/_layout-base.css">';
      // 3. Specific layout override (if any)
      if (layoutId) {
        // Sanitize: only allow alphanumeric, forward-slash, hyphen, underscore, dot
        var safeLayoutId = layoutId.replace(/[^a-zA-Z0-9\-_./]/g, '');
        links += '\n<link rel="stylesheet" id="__shell-layout-link" href="' + baseUrl + '/styles/layouts/' + safeLayoutId + '.css">';
      }
      return links;
    }

    // ── Build CSS variable block from theme object ───────────────────────
    function buildThemeCss(theme) {
      if (!theme) return '';
      var lines = [':root {'];
      if (theme.bodyBg)      lines.push('  --bg: ' + theme.bodyBg + ';');
      if (theme.cardBg)      lines.push('  --card: ' + theme.cardBg + ';');
      if (theme.primary)     lines.push('  --primary: ' + theme.primary + ';');
      if (theme.textColor)   lines.push('  --text: ' + theme.textColor + ';');
      if (theme.subTextColor)lines.push('  --sub: ' + theme.subTextColor + ';');

      // ── Mini chart / palette CSS variables ──────────────────────────────
      // These are used by inline SVG mini charts (sparkline, bar, pie, etc.)
      if (theme.primary)   lines.push('  --palette-primary: ' + theme.primary + ';');
      if (theme.colors && theme.colors.length > 0) {
        theme.colors.forEach(function(c, i) {
          lines.push('  --palette-color-' + (i + 1) + ': ' + c + ';');
        });
      }
      lines.push('  --mini-chart-height: 40px;');
      lines.push('  --mini-chart-line-width: 2px;');
      lines.push('}');

      var overrides = [];
      if (theme.bodyBg)    overrides.push('  background-color: ' + theme.bodyBg + ' !important;');
      if (theme.textColor) overrides.push('  color: ' + theme.textColor + ' !important;');
      if (theme.fontFamily) overrides.push('  font-family: ' + theme.fontFamily + ' !important;');
      if (theme.fontSize)   overrides.push('  font-size: ' + theme.fontSize + ' !important;');
      if (overrides.length > 0) {
        lines.push('html, body {');
        lines = lines.concat(overrides);
        lines.push('}');
      }

      if (theme.cardBg) {
        lines.push('.card, [class*="card"], .kpi-card, .chart-card, .section {');
        lines.push('  background-color: ' + theme.cardBg + ' !important;');
        lines.push('}');
      }

      if (theme.textColor) {
        lines.push('table, th, td, tr { color: ' + theme.textColor + '; }');
      }

      if (theme.cardBg && theme.textColor) {
        lines.push('th { background-color: ' + theme.cardBg + ' !important; color: ' + theme.textColor + ' !important; }');
        lines.push('tr:nth-child(even) td { background-color: ' + (theme.bodyBg || theme.cardBg) + ' !important; }');
      }

      if (theme.isDark) {
        lines.push('a { color: ' + (theme.primary || '#60a5fa') + ' !important; }');
        if (theme.bodyBg) lines.push('input, select, textarea { background: ' + theme.cardBg + '; color: ' + theme.textColor + '; }');
      }

      if (theme.backgroundImage) {
        var bgSize = theme.backgroundSize === 'fill'
          ? '100% 100%'
          : (theme.backgroundSize || 'cover');
        var bgRepeat = theme.backgroundRepeat || 'no-repeat';
        var bgPos = theme.backgroundPosition || 'center';
        var bgOpacity = typeof theme.backgroundOpacity === 'number'
          ? Math.min(1, Math.max(0, theme.backgroundOpacity / 100))
          : 0.5;
        lines.push('html, body { position: relative; }');
        lines.push('body::before {');
        lines.push('  content: "";');

      '<\/script>';

    // ── Render an HTML string ────────────────────────────────────────────
    function renderHtml(html, theme) {

      var themeLinkCss = buildThemeLink(themeId, layoutId);

      var vtableInitScript = hasVTable

          '        var _c=container, _o=opts;\n' +
          '        function _retry() {\n' +

          '          if (!e2) { console.warn("[VTable] container not found:", _c); return; }\n' +
          '          if (e2.offsetHeight === 0) e2.style.minHeight = "300px";\n' +
          '          try {\n' +
          '            _rInst = new Orig(e2, _o);\n' +

    // ── Live theme patch without rebuilding iframe ───────────────────────
    function patchTheme(theme) {

            'bento':          'bento',
            'neo-brutalism':  'neo-brutalism',
            'editorial':      'editorial',

    window.addEventListener('message', function(e) {

        // Direct from React parent — forward IMMEDIATELY without forwardChartResize's debounce.
        // The parent already handles timing (immediate + RAF + 200ms). Going through forwardChartResize
        // would cause the burst of signals to continuously reset the debounce timer so the inner frame

    // When the panel is dragged or the window is resized, chart instances
    // in the inner frame need an explicit .resize() call to fill the new space.
    var _chartResizeTimer;
    var _chartResizeTimer2;
    function forwardChartResize() {
      clearTimeout(_chartResizeTimer);
      clearTimeout(_chartResizeTimer2);
      _chartResizeTimer = setTimeout(function() {
        try { frame.contentWindow.postMessage({ type: 'chart-resize' }, '*'); } catch(e) {}
