name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to file a bug report. Please fill out the form below.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Describe what went wrong...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Open the app
        2. Upload file '...'
        3. Type '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: App version
      placeholder: e.g. 1.0.0
    validations:
      required: true

  - type: dropdown
    id: model_provider
    attributes:
      label: AI model provider (if relevant)
      options:
        - OpenAI / Azure OpenAI
        - Anthropic Claude
        - DeepSeek
        - Ollama (local)
        - Other
        - Not applicable

  - type: textarea
    id: logs
    attributes:
      label: Logs or error messages
      description: Paste any relevant console output or error messages.
      render: text
