<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Datell</title>
    <style>
      #app-loading {
        position: fixed; inset: 0; z-index: 9999;
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 28px;
        transition: opacity 0.4s cubic-bezier(.4,0,.2,1);
      }
      #app-loading.fade-out { opacity: 0; pointer-events: none; }
      .splash-logo {
        width: 72px; height: 72px;
        background: linear-gradient(135deg, #3b82f6, #06b6d4);
        border-radius: 18px;
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 0 40px rgba(59,130,246,.4);
        animation: splash-pulse 2s ease-in-out infinite;
      }
      @keyframes splash-pulse {
        0%,100% { box-shadow: 0 0 30px rgba(59,130,246,.35); }
        50%      { box-shadow: 0 0 60px rgba(6,182,212,.55); }
      }
      .splash-title {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        font-size: 22px; font-weight: 600; letter-spacing: .02em; color: #f1f5f9; text-align: center;
      }
      .splash-title span {
        background: linear-gradient(90deg, #60a5fa, #22d3ee);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      }
      .splash-sub {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        font-size: 12px; color: #475569; letter-spacing: .06em; margin-top: -16px; text-align: center;
      }
      .splash-dots { display: flex; gap: 8px; align-items: center; }
      .splash-dots span {
        width: 7px; height: 7px; border-radius: 50%; background: #3b82f6;
        animation: splash-dot 1.2s ease-in-out infinite;
      }
      .splash-dots span:nth-child(2) { animation-delay: .2s; background: #60a5fa; }
      .splash-dots span:nth-child(3) { animation-delay: .4s; background: #22d3ee; }
      @keyframes splash-dot {
        0%,80%,100% { transform: scale(.65); opacity: .4; }
        40%          { transform: scale(1.1); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="app-loading">
      <div class="splash-logo">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
          <rect x="4"    y="20" width="5" height="12" rx="2" fill="rgba(255,255,255,.9)"/>
          <rect x="11.5" y="13" width="5" height="19" rx="2" fill="rgba(255,255,255,.9)"/>
          <rect x="19"   y="7"  width="5" height="25" rx="2" fill="rgba(255,255,255,.9)"/>
          <rect x="26.5" y="2"  width="5" height="30" rx="2" fill="rgba(255,255,255,.9)"/>
          <polyline points="4,28 13.5,18 21,12 29,4" stroke="#22d3ee" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
      </div>
      <div>
        <div class="splash-title">Datell</div>
        <div class="splash-sub">LET YOUR DATA TELL THE STORY</div>
      </div>
      <div class="splash-dots"><span></span><span></span><span></span></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/renderer/index.tsx"></script>
  </body>
</html>
